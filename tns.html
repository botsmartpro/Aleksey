<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ТНС Энерго</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
    color:#111827;
}

.header{
    font-size:30px;
    font-weight:700;
    margin-bottom:24px;
}

.card{
    background:white;
    border-radius:24px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 4px 18px rgba(0,0,0,0.06);
}

.card h2{
    font-size:22px;
    margin-bottom:16px;
}

.input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#f3f4f6;
    font-size:16px;
    outline:none;
}

.button{
    width:100%;
    padding:16px;
    margin-top:14px;
    border:none;
    border-radius:16px;
    background:#111827;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.button:active{
    transform:scale(0.98);
}

.saved{
    margin-top:14px;
    color:#16a34a;
    font-size:15px;
}

.notifications{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.notification{
    background:#f3f4f6;
    border-radius:18px;
    padding:16px;
}

.notification-title{
    font-size:15px;
    font-weight:600;
}

.notification-date{
    margin-top:6px;
    font-size:12px;
    color:#6b7280;
}

.balance{
    font-size:34px;
    font-weight:700;
    margin-top:10px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:14px 0;
    box-shadow:0 -2px 14px rgba(0,0,0,0.08);
}

.nav-item{
    font-size:14px;
    color:#6b7280;
}

.active{
    color:#111827;
    font-weight:600;
}

.spacer{
    height:90px;
}
</style>
</head>

<body>

<div class="header">
    ТНС Энерго
</div>

<div class="card">
    <h2>Баланс</h2>

    <div class="balance">
        1 245 ₽
    </div>
</div>

<div class="card">
    <h2>Показания</h2>

    <input
        type="number"
        id="meterInput"
        class="input"
        placeholder="Введите показания"
    >

    <button class="button" onclick="saveMeter()">
        Сохранить
    </button>

    <div id="savedText" class="saved"></div>
</div>

<div class="card">
    <h2>Уведомления</h2>

    <div class="notifications">

        <div class="notification">
            <div class="notification-title">
                Передайте показания до 25 числа
            </div>

            <div class="notification-date">
                Сегодня
            </div>
        </div>

        <div class="notification">
            <div class="notification-title">
                Платеж успешно зачислен
            </div>

            <div class="notification-date">
                Вчера
            </div>
        </div>

        <div class="notification">
            <div class="notification-title">
                Новые тарифы вступают в силу с 1 июня
            </div>

            <div class="notification-date">
                2 дня назад
            </div>
        </div>

        <div class="notification">
            <div class="notification-title">
                Плановые работы на сервисе ночью
            </div>

            <div class="notification-date">
                3 дня назад
            </div>
        </div>

    </div>
</div>

<div class="spacer"></div>

<div class="bottom-nav">
    <div class="nav-item active">Главная</div>
    <div class="nav-item">Показания</div>
    <div class="nav-item">Оплата</div>
    <div class="nav-item">Профиль</div>
</div>

<script>
function saveMeter(){

    const value =
        document.getElementById('meterInput').value;

    if(value === ''){
        alert('Введите показания');
        return;
    }

    localStorage.setItem('meterValue', value);

    document.getElementById('savedText').innerText =
        'Сохранено значение: ' + value;
}

window.onload = function(){

    const saved =
        localStorage.getItem('meterValue');

    if(saved){

        document.getElementById('savedText').innerText =
            'Сохранено значение: ' + saved;

        document.getElementById('meterInput').value =
            saved;
    }
}
</script>

</body>
</html>
