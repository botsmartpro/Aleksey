<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aleksey App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #111;
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255,255,255,0.1);
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      background: #00c853;
      color: white;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 15px;
    }

    .btn:hover {
      background: #00a844;
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Aleksey Pay</div>

    <div class="subtitle">
      Добро пожаловать в web-приложение.<br>
      Проект размещен на GitHub Pages.
    </div>

    <button class="btn" onclick="openApp()">
      Открыть приложение
    </button>

    <button class="btn" onclick="showInfo()">
      Информация
    </button>

    <div class="footer">
      GitHub Pages Demo
    </div>
  </div>

  <script>
    function openApp() {
      alert('Приложение открыто');
    }

    function showInfo() {
      alert('Сайт успешно работает через GitHub Pages');
    }
  </script>

</body>
</html>
